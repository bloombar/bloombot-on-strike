services:
  - type: web
    name: Zoom Meeting SDK Auth Sample
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    repo: https://github.com/zoom/meetingsdk-auth-endpoint-sample
    rootDir: .
    plan: free
    envVars:
      - key: ZOOM_OAUTH_CLIENT_ID
        sync: false
      - key: ZOOM_OAUTH_CLIENT_SECRET
        sync: false
